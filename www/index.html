<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#08080f">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WordMaster · 智能单词学习</title>

<style>
/* ================================================================
   CSS 变量体系 — 暗色玻璃主题
   ================================================================ */
:root {
  /* 底色 */
  --bg: #08080f;
  --bg-card: rgba(22, 22, 40, 0.55);
  --bg-card-hover: rgba(26, 26, 48, 0.65);
  --surface: rgba(255, 255, 255, 0.03);
  --surface-hover: rgba(255, 255, 255, 0.06);

  /* 边框 */
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);

  /* 文字 */
  --text: #ededf5;
  --text-secondary: #a0a0b8;
  --text-muted: #5c5c72;

  /* 强调色 */
  --accent: #7b93ff;
  --accent-warm: #b095f9;
  --accent-glow: rgba(123, 147, 255, 0.18);
  --success: #4ecb71;
  --warning: #f0a050;
  --danger: #f25e5e;

  /* 渐变 */
  --gradient: linear-gradient(135deg, #7b93ff, #b095f9);
  --gradient-warm: linear-gradient(135deg, #b095f9, #f472b6);
  --gradient-success: linear-gradient(135deg, #3da55a, #5ddb7a);

  /* 排版 */
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  --font-mono: "SF Mono", "Cascadia Code", "Consolas", "Menlo", monospace;

  /* 间距 */
  --page-pad: 24px;
  --card-gap: 14px;
  --section-gap: 20px;
  --nav-height: 64px;

  /* 效果 */
  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 22px;
  --radius-xl: 28px;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.35);
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.45), 0 1px 4px rgba(0, 0, 0, 0.3);
  --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.55), 0 2px 8px rgba(0, 0, 0, 0.35);
  --transition: 0.25s cubic-bezier(0.22, 0.61, 0.36, 1);
  --transition-slow: 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
}

/* ================================================================
   基础重置
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: var(--bg); -webkit-tap-highlight-color: transparent; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-height) + 20px + env(safe-area-inset-bottom, 0px));
  position: relative;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  /* 点阵背景 */
  background-image: radial-gradient(circle, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* 环境光斑 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 25% 15%, rgba(123, 147, 255, 0.05) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 75% 70%, rgba(176, 149, 249, 0.04) 0%, transparent 55%),
    radial-gradient(ellipse 40% 35% at 50% 90%, rgba(244, 114, 182, 0.03) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
  animation: ambientShift 24s ease-in-out infinite;
}
@keyframes ambientShift {
  0%, 100% { opacity: 0.7; }
  33% { opacity: 1; }
  66% { opacity: 0.6; }
}

/* 滚动条 */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 2px; }

img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; }

/* ================================================================
   通用组件
   ================================================================ */

/* 按钮 */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 0.88rem; font-weight: 600;
  border: none; cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-primary {
  background: var(--gradient);
  color: #fff;
  box-shadow: 0 4px 18px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(123, 147, 255, 0.32); }
.btn-outline {
  background: transparent;
  color: var(--text-secondary);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { background: var(--surface-hover); border-color: var(--border-hover); color: var(--text); }
.btn-sm { padding: 6px 14px; font-size: 0.78rem; border-radius: 30px; }
.btn-icon {
  width: 38px; height: 38px; padding: 0; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 1.1rem;
}
.btn-icon:hover { background: var(--surface-hover); border-color: var(--border-hover); color: var(--text); }

/* 标签 */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 500;
  background: var(--surface); color: var(--text-secondary);
  border: 1px solid var(--border);
}
.tag.active { background: var(--accent-glow); color: var(--accent); border-color: rgba(123, 147, 255, 0.25); }
.tag-mastery { font-size: 0.7rem; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
.tag-mastery.new { background: rgba(240, 160, 80, 0.15); color: var(--warning); }
.tag-mastery.learning { background: rgba(123, 147, 255, 0.15); color: var(--accent); }
.tag-mastery.mastered { background: rgba(78, 203, 113, 0.15); color: var(--success); }

/* 卡片 */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all var(--transition);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.card:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }

/* 输入框 */
.input {
  width: 100%; padding: 14px 18px;
  background: rgba(255, 255, 255, 0.05);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--text); font-size: 1rem;
  outline: none; transition: all var(--transition);
}
.input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 0 3px var(--accent-glow); }
.input::placeholder { color: var(--text-muted); }

/* Toast */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text); padding: 12px 24px; border-radius: 50px;
  font-size: 0.88rem; font-weight: 500;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow-lg);
  z-index: 9999; pointer-events: none;
  opacity: 0; transition: opacity 0.35s ease;
}
.toast.show { opacity: 1; }

/* 骨架屏 */
.skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* 空状态 */
.empty-state {
  text-align: center; padding: 48px 24px; color: var(--text-muted);
}
.empty-state .icon { font-size: 3.5rem; margin-bottom: 16px; opacity: 0.6; }
.empty-state h3 { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 6px; }
.empty-state p { font-size: 0.88rem; line-height: 1.6; }

/* Modal 遮罩 */
.modal-overlay {
  position: fixed; inset: 0; z-index: 8000;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity var(--transition-slow);
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: #12121f; border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 28px;
  width: 100%; max-width: 420px;
  box-shadow: var(--shadow-lg);
  max-height: 80vh; overflow-y: auto;
}
.modal h3 { font-size: 1.15rem; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

/* 页面容器 */
.page {
  display: none;
  max-width: 720px; width: 100%;
  margin: 0 auto; padding: var(--page-pad);
  position: relative; z-index: 1;
  animation: pageIn 0.3s ease;
}
.page.active { display: block; }
@keyframes pageIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ================================================================
   底部导航栏
   ================================================================ */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 7000;
  background: rgba(12, 12, 24, 0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: var(--nav-height);
  padding: 0 8px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bottom-nav .nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none;
  color: var(--text-muted);
  font-size: 0.68rem; font-weight: 500;
  padding: 6px 12px; border-radius: var(--radius-sm);
  transition: all var(--transition);
  cursor: pointer;
  min-width: 56px;
  position: relative;
}
.bottom-nav .nav-item .nav-icon { font-size: 1.35rem; transition: all var(--transition); }
.bottom-nav .nav-item.active { color: var(--accent); }
.bottom-nav .nav-item.active .nav-icon { transform: translateY(-2px); }
.bottom-nav .nav-item.active::before {
  content: ''; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 2px;
  background: var(--accent); border-radius: 1px;
}
.bottom-nav .nav-badge {
  position: absolute; top: 0; right: 4px;
  min-width: 16px; height: 16px;
  background: var(--danger); color: #fff;
  font-size: 0.6rem; font-weight: 700;
  border-radius: 8px; display: flex;
  align-items: center; justify-content: center;
  padding: 0 4px;
}

/* ================================================================
   顶部搜索栏（首页专用）
   ================================================================ */
.search-header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8, 8, 15, 0.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  padding: 16px 0 12px;
  margin: -4px 0 8px;
}
.search-header .logo {
  text-align: center; margin-bottom: 14px;
  font-size: 1.4rem; font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.search-input-wrap {
  position: relative; display: flex; align-items: center;
  background: rgba(255, 255, 255, 0.05);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  transition: all var(--transition);
}
.search-input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }
.search-input-wrap input {
  flex: 1; background: none; border: none;
  padding: 14px 16px; padding-right: 44px;
  color: var(--text); font-size: 1.05rem; outline: none;
}
.search-input-wrap input::placeholder { color: var(--text-muted); }
.search-input-wrap .search-icon {
  position: absolute; right: 12px;
  font-size: 1.2rem; color: var(--text-muted);
  pointer-events: none; transition: color var(--transition);
}
.search-input-wrap:focus-within .search-icon { color: var(--accent); }
.search-suggestions {
  position: absolute; top: 100%; left: 0; right: 0;
  background: rgba(18, 18, 31, 0.98);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 6px;
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  max-height: 240px; overflow-y: auto;
  display: none; z-index: 200;
}
.search-suggestions.open { display: block; }
.search-suggestions .sug-item {
  padding: 12px 16px; cursor: pointer;
  font-size: 0.92rem; color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
}
.search-suggestions .sug-item:last-child { border-bottom: none; }
.search-suggestions .sug-item:hover { background: var(--surface-hover); color: var(--text); }

/* 历史标签 */
.history-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  margin-top: 12px;
}
.history-tag {
  padding: 5px 14px; border-radius: 20px;
  font-size: 0.78rem;
  background: var(--surface); color: var(--text-muted);
  border: 1px solid var(--border);
  cursor: pointer; transition: all var(--transition);
}
.history-tag:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-hover); }

/* ================================================================
   减少动画
   ================================================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0s !important;
    transition-duration: 0s !important;
  }
}

/* ================================================================
   响应式
   ================================================================ */
@media (max-width: 480px) {
  :root { --page-pad: 16px; --section-gap: 14px; --nav-height: 56px; }
  .page { padding: var(--page-pad); }
  .bottom-nav .nav-item { font-size: 0.62rem; min-width: 48px; padding: 4px 6px; }
  .bottom-nav .nav-item .nav-icon { font-size: 1.2rem; }
  .search-header .logo { font-size: 1.2rem; }
}
</style>
</head>
<body>

<!-- ========== Toast 消息 ========== -->
<div class="toast" id="toast"></div>

<!-- ========== Modal 通用弹窗 ========== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>

<!-- ========== 页面 1：首页（搜索 + 每日一词 + 历史） ========== -->
<div class="page active" id="page-home">
  <div class="search-header">
    <div class="logo">📖 WordMaster</div>
    <div class="search-input-wrap" id="searchWrap">
      <input type="text" id="searchInput" placeholder="输入英文或中文单词…" autocomplete="off">
      <span class="search-icon">🔍</span>
      <div class="search-suggestions" id="searchSuggestions"></div>
    </div>
    <div class="history-row" id="historyRow"></div>
  </div>

  <!-- 每日一词卡片（占位） -->
  <div class="card" id="dailyWordCard" style="margin-top: 12px; text-align: center; padding: 28px 20px;">
    <p style="color: var(--text-muted);">🌟 每日一词将在 Task 9 实现</p>
  </div>

  <!-- 搜索结果区（占位） -->
  <div id="homeResult"></div>
</div>

<!-- ========== 页面 2：单词详情 ========== -->
<div class="page" id="page-detail">
  <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
    <button class="btn-icon" onclick="navigateTo('home')" title="返回">←</button>
    <span style="font-size: 1.1rem; font-weight: 700;" id="detailTitle">单词详情</span>
  </div>
  <div id="detailContent">
    <div class="empty-state"><div class="icon">📖</div><h3>查一个单词吧</h3><p>在首页搜索单词后，详情会展示在这里</p></div>
  </div>
</div>

<!-- ========== 页面 3：生词本 ========== -->
<div class="page" id="page-wordbook">
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
    <h2 style="font-size: 1.3rem;">📚 我的生词本</h2>
    <div style="display: flex; gap: 8px;">
      <button class="btn btn-sm btn-outline" onclick="showWordbookActions()">⚙️</button>
    </div>
  </div>
  <!-- 文件夹筛选 -->
  <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;" id="folderFilters"></div>
  <!-- 搜索 + 排序 -->
  <div style="display: flex; gap: 8px; margin-bottom: 16px;">
    <input class="input" type="text" id="wordbookSearch" placeholder="搜索生词…" style="padding: 10px 14px; font-size: 0.88rem;">
    <select class="input" id="wordbookSort" style="width: auto; padding: 10px 14px; font-size: 0.82rem;">
      <option value="time">🕐 时间</option>
      <option value="alpha">🔤 字母</option>
      <option value="mastery">🎯 熟练度</option>
    </select>
  </div>
  <div id="wordbookList">
    <div class="empty-state"><div class="icon">📚</div><h3>还没有收藏单词</h3><p>查单词时点击「加入生词本」即可收藏</p></div>
  </div>
</div>

<!-- ========== 页面 4：学习模式 ========== -->
<div class="page" id="page-study">
  <h2 style="font-size: 1.3rem; margin-bottom: 6px;">🎯 今日学习</h2>
  <p style="color: var(--text-muted); font-size: 0.88rem; margin-bottom: 20px;" id="studySummary">加载中…</p>

  <!-- 今日复习进度 -->
  <div class="card" style="margin-bottom: 20px; text-align: center;" id="studyProgressCard">
    <p style="color: var(--text-muted);">复习进度将在 Task 7 实现</p>
  </div>

  <!-- 学习模式选择 -->
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--card-gap);" id="studyModeGrid">
    <button class="card" onclick="startStudy('flashcard')" style="text-align: center; cursor: pointer;">
      <div style="font-size: 2.2rem; margin-bottom: 8px;">🃏</div>
      <div style="font-weight: 700; font-size: 0.95rem;">卡片翻转</div>
      <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 4px;">看英文想中文</div>
    </button>
    <button class="card" onclick="startStudy('quiz')" style="text-align: center; cursor: pointer;">
      <div style="font-size: 2.2rem; margin-bottom: 8px;">📝</div>
      <div style="font-weight: 700; font-size: 0.95rem;">选择题</div>
      <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 4px;">4 选 1 测验</div>
    </button>
    <button class="card" onclick="startStudy('dictation')" style="text-align: center; cursor: pointer;">
      <div style="font-size: 2.2rem; margin-bottom: 8px;">🎧</div>
      <div style="font-weight: 700; font-size: 0.95rem;">听写模式</div>
      <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 4px;">听发音写拼写</div>
    </button>
  </div>

  <!-- 学习界面容器 -->
  <div id="studyArea"></div>
</div>

<!-- ========== 页面 5：设置 ========== -->
<div class="page" id="page-settings">
  <h2 style="font-size: 1.3rem; margin-bottom: 6px;">⚙️ 我的</h2>
  <p style="color: var(--text-muted); font-size: 0.88rem; margin-bottom: 20px;">数据管理与偏好设置</p>

  <div class="card" style="margin-bottom: var(--card-gap);">
    <h3 style="font-size: 1rem; margin-bottom: 12px;">📦 数据管理</h3>
    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
      <button class="btn btn-outline btn-sm" onclick="exportData()">📥 导出数据</button>
      <button class="btn btn-outline btn-sm" onclick="importData()">📤 导入数据</button>
      <button class="btn btn-outline btn-sm" style="color: var(--danger); border-color: rgba(242,94,94,0.3);" onclick="clearAllData()">🗑 清除数据</button>
    </div>
    <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="handleImportFile(event)">
  </div>

  <div class="card" style="margin-bottom: var(--card-gap);">
    <h3 style="font-size: 1rem; margin-bottom: 12px;">🎯 每日一词来源</h3>
    <select class="input" id="dailyWordSource" onchange="saveDailyWordSource()" style="font-size: 0.9rem;">
      <option value="builtin">📚 分级词库（精选单词）</option>
      <option value="wordbook">📖 从生词本随机抽</option>
      <option value="api">🌐 API 随机推荐</option>
    </select>
  </div>

  <div class="card" style="margin-bottom: var(--card-gap);">
    <h3 style="font-size: 1rem; margin-bottom: 12px;">📚 目标词库</h3>
    <select class="input" id="targetBank" onchange="saveTargetBank()" style="font-size: 0.9rem;">
      <option value="cet4">🎓 四级 (CET-4)</option>
      <option value="cet6">🎓 六级 (CET-6)</option>
      <option value="kaoyan">📝 考研</option>
      <option value="ielts">🌏 雅思 (IELTS)</option>
      <option value="toefl">🌏 托福 (TOEFL)</option>
      <option value="daily">💬 日常口语</option>
      <option value="business">💼 商务英语</option>
    </select>
  </div>

  <div class="card">
    <h3 style="font-size: 1rem; margin-bottom: 12px;">🎯 每日复习目标</h3>
    <div style="display: flex; align-items: center; gap: 12px;">
      <input type="range" id="dailyGoalSlider" min="5" max="50" step="5" value="20" oninput="updateDailyGoal(this.value)" style="flex: 1;">

<!-- =================================================================
     JavaScript
     ================================================================= -->
<script>
(function() {
'use strict';

/* ================================================================
   全局状态
   ================================================================ */
const STATE = {
  currentPage: 'home',
  wordbook: [],            // 生词本
  stats: {},               // 每日统计 { 'YYYY-MM-DD': { queries, reviewed, mastered } }
  settings: {},            // 用户设置
  searchHistory: [],       // 搜索历史（内存镜像）
  searchCache: new Map(),  // API 结果缓存 { key → { data, ts } }
  CACHE_TTL: 5 * 60 * 1000,
};

// 默认文件夹
const DEFAULT_FOLDERS = ['默认', '考研', '四级', '六级', '雅思', '托福', '日常', '工作'];

/* ================================================================
   Data Layer — localStorage 封装
   ================================================================ */
const STORAGE_PREFIX = 'wm_';

function saveToStorage(key, data) {
  try {
    localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(data));
  } catch (e) {
    console.warn('localStorage 写入失败:', key, e.message);
    showToast('⚠️ 存储空间不足，请清理旧数据');
  }
}

function loadFromStorage(key, fallback) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + key);
    if (raw === null) return fallback;
    return JSON.parse(raw);
  } catch (e) {
    console.warn('localStorage 读取失败:', key, e.message);
    return fallback;
  }
}

function removeFromStorage(key) {
  try {
    localStorage.removeItem(STORAGE_PREFIX + key);
  } catch (e) { /* silent */ }
}

/* ================================================================
   Data Layer — 生词本 CRUD
   ================================================================ */
function getWordbook() {
  if (STATE.wordbook.length === 0) {
    STATE.wordbook = loadFromStorage('wordbook', []);
  }
  return STATE.wordbook;
}

function saveWordbook() {
  saveToStorage('wordbook', STATE.wordbook);
}

function addToWordbook(wordData) {
  const wb = getWordbook();
  // 防重复
  const exists = wb.find(w => w.word.toLowerCase() === wordData.word.toLowerCase());
  if (exists) return false;

  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    word: wordData.word,
    phonetic: wordData.phonetic || '',
    phoneticAm: wordData.phoneticAm || '',
    meaning: wordData.meaning || '',
    pos: wordData.pos || '',
    audioUrl: wordData.audioUrl || '',
    addedAt: Date.now(),
    folder: wordData.folder || '默认',
    tags: wordData.tags || [],
    mastery: 0,          // 0=生疏, 1=犹豫, 2=熟悉
    reviewCount: 0,
    nextReview: Date.now(), // 首次即可复习
    lastReview: null,
    easeFactor: 2.5,
    interval: 0,
    notes: '',
  };
  STATE.wordbook.unshift(entry);
  saveWordbook();
  return true;
}

function removeFromWordbook(wordId) {
  STATE.wordbook = STATE.wordbook.filter(w => w.id !== wordId);
  saveWordbook();
}

function updateWordInBook(wordId, updates) {
  const idx = STATE.wordbook.findIndex(w => w.id === wordId);
  if (idx === -1) return;
  Object.assign(STATE.wordbook[idx], updates);
  saveWordbook();
}

function getWordFromBook(wordId) {
  return STATE.wordbook.find(w => w.id === wordId);
}

function isWordInBook(word) {
  return STATE.wordbook.some(w => w.word.toLowerCase() === word.toLowerCase());
}

function getWordbookFolders() {
  const folders = new Set(DEFAULT_FOLDERS);
  STATE.wordbook.forEach(w => folders.add(w.folder));
  return [...folders];
}

/* ================================================================
   Data Layer — 搜索历史
   ================================================================ */
function getHistory() {
  if (STATE.searchHistory.length === 0) {
    STATE.searchHistory = loadFromStorage('history', []);
  }
  return STATE.searchHistory;
}

function addToHistory(word) {
  getHistory();
  STATE.searchHistory = STATE.searchHistory.filter(w => w !== word);
  STATE.searchHistory.unshift(word);
  if (STATE.searchHistory.length > 100) STATE.searchHistory.pop();
  saveToStorage('history', STATE.searchHistory);
}

/* ================================================================
   Data Layer — 统计数据
   ================================================================ */
function getStats() {
  if (Object.keys(STATE.stats).length === 0) {
    STATE.stats = loadFromStorage('stats', {});
  }
  return STATE.stats;
}

function saveStats() {
  saveToStorage('stats', STATE.stats);
}

function incrementStat(field) {
  const today = newDateString();
  const stats = getStats();
  if (!stats[today]) stats[today] = { queries: 0, reviewed: 0, mastered: 0 };
  stats[today][field] = (stats[today][field] || 0) + 1;
  saveStats();
}

function newDateString() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

/* ================================================================
   Data Layer — 用户设置
   ================================================================ */
const DEFAULT_SETTINGS = {
  dailyGoal: 20,
  dailyWordSource: 'builtin',   // 'api' | 'wordbook' | 'builtin'
  targetBank: 'cet4',
  autoPronounce: false,
};

function getSettings() {
  if (Object.keys(STATE.settings).length === 0) {
    STATE.settings = loadFromStorage('settings', {});
    // 合并默认值（新字段用默认值）
    STATE.settings = { ...DEFAULT_SETTINGS, ...STATE.settings };
  }
  return STATE.settings;
}

function saveSettings() {
  saveToStorage('settings', STATE.settings);
}

/* ================================================================
   Data Layer — 每日一词
   ================================================================ */
function getDailyWord() {
  return loadFromStorage('dailyWord', null);
}

function setDailyWord(wordData) {
  const entry = { ...wordData, date: newDateString() };
  saveToStorage('dailyWord', entry);
}

/* ================================================================
   Data Layer — 导出/导入
   ================================================================ */
function exportAllData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    wordbook: getWordbook(),
    stats: getStats(),
    settings: getSettings(),
    history: getHistory(),
    dailyWord: getDailyWord(),
  };
  return JSON.stringify(data, null, 2);
}

function importAllData(jsonStr) {
  let data;
  try {
    data = JSON.parse(jsonStr);
    if (!data || typeof data !== 'object') throw new Error('格式错误');
    if (!data.version) throw new Error('不是有效的 WordMaster 备份文件');
  } catch (e) {
    throw new Error('文件格式不正确: ' + e.message);
  }

  // 导入各模块
  if (Array.isArray(data.wordbook)) {
    STATE.wordbook = data.wordbook;
    saveWordbook();
  }
  if (data.stats && typeof data.stats === 'object') {
    STATE.stats = data.stats;
    saveStats();
  }
  if (data.settings && typeof data.settings === 'object') {
    STATE.settings = { ...DEFAULT_SETTINGS, ...data.settings };
    saveSettings();
  }
  if (Array.isArray(data.history)) {
    STATE.searchHistory = data.history;
    saveToStorage('history', STATE.searchHistory);
  }
  if (data.dailyWord) {
    setDailyWord(data.dailyWord);
  }
}

function clearAllData() {
  // 暴力清除所有 localStorage
  const keys = Object.keys(localStorage).filter(k => k.startsWith(STORAGE_PREFIX));
  keys.forEach(k => {
    try { localStorage.removeItem(k); } catch(e) { console.warn('清除失败:', k, e); }
  });
  console.log('🗑 已清除 localStorage:', keys.length, '项');

  // 重置内存状态
  STATE.wordbook = [];
  STATE.stats = {};
  STATE.settings = { ...DEFAULT_SETTINGS };
  STATE.searchHistory = [];
  STATE.searchCache.clear();
}

/* ================================================================
   Toast 消息
   ================================================================ */
let toastTimer;
function showToast(msg, duration = 1800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

/* ================================================================
   Modal 弹窗
   ================================================================ */
function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

/* ================================================================
   页面路由
   ================================================================ */
function navigateTo(page) {
  if (STATE.currentPage === page) return;

  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById('page-' + page);
  if (target) target.classList.add('active');

  document.querySelectorAll('.bottom-nav .nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === page);
  });

  STATE.currentPage = page;
  window.scrollTo({ top: 0, behavior: 'instant' });

  // 进入页面时刷新
  if (page === 'wordbook') renderWordbook();
  if (page === 'study') renderStudyPage();
  if (page === 'stats') renderStats();
  if (page === 'settings') renderSettings();
}

document.querySelectorAll('.bottom-nav .nav-item').forEach(btn => {
  btn.addEventListener('click', () => navigateTo(btn.dataset.page));
});

/* ================================================================
   搜索栏
   ================================================================ */
const searchInput = document.getElementById('searchInput');
const searchSuggestions = document.getElementById('searchSuggestions');
let suggestTimer;

searchInput.addEventListener('input', () => {
  clearTimeout(suggestTimer);
  const val = searchInput.value.trim();
  if (val.length < 1) { searchSuggestions.classList.remove('open'); return; }
  suggestTimer = setTimeout(() => showSuggestions(val), 200);
});

searchInput.addEventListener('focus', () => {
  const val = searchInput.value.trim();
  if (val.length >= 1) showSuggestions(val);
});

searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const word = searchInput.value.trim();
    if (word) { searchWord(word); searchSuggestions.classList.remove('open'); }
  }
});

document.addEventListener('click', (e) => {
  if (!document.getElementById('searchWrap').contains(e.target)) {
    searchSuggestions.classList.remove('open');
  }
});

function showSuggestions(query) {
  const history = getHistory().slice(0, 8);
  if (history.length === 0) { searchSuggestions.classList.remove('open'); return; }
  const matched = history.filter(h => h.toLowerCase().includes(query.toLowerCase()));
  if (matched.length === 0) { searchSuggestions.classList.remove('open'); return; }
  searchSuggestions.innerHTML = matched.map(w =>
    `<div class="sug-item" onclick="searchWord('${w.replace(/'/g, "\\'")}')">🕐 ${w}</div>`
  ).join('');
  searchSuggestions.classList.add('open');
}

function renderHistory() {
  const row = document.getElementById('historyRow');
  const history = getHistory();
  if (history.length === 0) { row.innerHTML = ''; return; }
  row.innerHTML = history.slice(0, 8).map(w =>
    `<span class="history-tag" onclick="searchWord('${w.replace(/'/g, "\\'")}')">${w}</span>`
  ).join('');
}

/* ================================================================
   API 聚合层
   ================================================================ */
const API = {
  DICT:    'https://api.dictionaryapi.dev/api/v2/entries/en/',
  YOUDAO:  'https://dict.youdao.com/suggest',
  DATAMUSE:'https://api.datamuse.com',
  MYMEMORY:'https://api.mymemory.translated.net/get',
  TIMEOUT: 6000,
};

async function fetchWithTimeout(url, timeout = API.TIMEOUT) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeout);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    return res;
  } catch (e) {
    clearTimeout(timer);
    throw e;
  }
}

/* ================================================================
   单词搜索 — 主入口
   ================================================================ */
async function searchWord(word) {
  const trimmed = word.trim();
  if (!trimmed) return;

  addToHistory(trimmed);
  searchInput.value = '';
  searchSuggestions.classList.remove('open');
  renderHistory();
  incrementStat('queries');

  // 检查缓存
  const cacheKey = trimmed.toLowerCase();
  const cached = STATE.searchCache.get(cacheKey);
  if (cached && Date.now() - cached.ts < STATE.CACHE_TTL) {
    showWordDetail(cached.data, trimmed);
    return;
  }

  // 跳详情页 + 显示加载
  navigateTo('detail');
  document.getElementById('detailTitle').textContent = trimmed;
  document.getElementById('detailContent').innerHTML =
    '<div class="card" style="text-align:center;padding:48px 24px;">' +
    '<div class="skeleton" style="width:60px;height:60px;border-radius:50%;margin:0 auto 16px;"></div>' +
    '<div class="skeleton" style="height:20px;width:200px;margin:0 auto 12px;"></div>' +
    '<div class="skeleton" style="height:14px;width:160px;margin:0 auto 8px;"></div>' +
    '<div class="skeleton" style="height:14px;width:120px;margin:0 auto;"></div>' +
    '<p style="color:var(--text-muted);margin-top:20px;font-size:0.82rem;">🔍 正在查询多个数据源…</p></div>';

  try {
    const isChinese = /[一-鿿]/.test(trimmed);
    const data = isChinese
      ? await lookupZhToEn(trimmed)
      : await lookupEnToZh(trimmed);

    // 缓存
    STATE.searchCache.set(cacheKey, { data, ts: Date.now() });
    // 清理过期缓存（超过 50 条时）
    if (STATE.searchCache.size > 50) {
      const now = Date.now();
      for (const [k, v] of STATE.searchCache) {
        if (now - v.ts > STATE.CACHE_TTL) STATE.searchCache.delete(k);
      }
    }

    showWordDetail(data, trimmed);
  } catch (e) {
    console.error('搜索失败:', trimmed, e);
    document.getElementById('detailContent').innerHTML =
      '<div class="card" style="text-align:center;padding:48px 24px;">' +
      '<div style="font-size:3rem;margin-bottom:12px;">😞</div>' +
      '<h3 style="margin-bottom:8px;">查询失败</h3>' +
      '<p style="color:var(--text-muted);margin-bottom:16px;">网络错误或未找到该单词</p>' +
      '<button class="btn btn-outline btn-sm" onclick="searchWord(\'' + trimmed.replace(/'/g, "\\'") + '\')">🔄 重试</button></div>';
  }
}

/* ================================================================
   英→中：Dictionary API + 有道 + Datamuse
   ================================================================ */
async function lookupEnToZh(word) {
  const results = await Promise.allSettled([
    fetchDictAPI(word),          // 英文释义 + 音标 + 发音
    fetchYoudao(word),           // 中文释义（可能 CORS 失败，有兜底）
    fetchMyMemoryCN(word),        // MyMemory 中文兜底
    fetchDatamuseSynonyms(word), // 同义词
    fetchDatamuseCollocations(word), // 搭配
  ]);

  const [dictR, youdaoR, memR, synR, colR] = results;

  const dictData = dictR.status === 'fulfilled' ? dictR.value : null;
  // 合并中文释义：有道优先 → MyMemory 兜底
  const cnYoudao = youdaoR.status === 'fulfilled' ? youdaoR.value : '';
  const cnMem = memR.status === 'fulfilled' ? memR.value : '';
  const cnExplain = cnYoudao || cnMem;
  const synonyms = synR.status === 'fulfilled' ? synR.value : [];
  const collocations = colR.status === 'fulfilled' ? colR.value : [];

  if (!dictData) {
    console.warn('⚠️ Dictionary API 未返回数据，使用兜底方案');
    // Dictionary API 失败，尝试用 MyMemory 翻译兜底
    const cn = cnExplain || await fetchMyMemory(word, 'en|zh');
    return {
      word,
      isChinese: false,
      phonetic: '',
      phoneticAm: '',
      audioUrl: '',
      meanings: cn ? [{ pos: '', definitions: [cn], examples: [] }] : [],
      chineseExplain: cn,
      synonyms: [],
      collocations: [],
      wordForms: [],
    };
  }

  // 从 Dictionary API 提取音标、发音、释义、变形
  const entry = dictData[0];
  let phoneticUk = '', phoneticAm = '', audioUrl = '';
  if (entry.phonetics) {
    for (const p of entry.phonetics) {
      if (p.text && !phoneticUk) phoneticUk = p.text;
      if (p.audio && !audioUrl) audioUrl = p.audio;
    }
  }
  // 尝试区分英美音标
  if (entry.phonetics) {
    const amP = entry.phonetics.find(p => p.text && p.audio && p.audio.includes('-us.'));
    if (amP) { phoneticAm = amP.text; phoneticUk = entry.phonetics.find(p => p.text && p !== amP)?.text || phoneticUk; }
  }

  // 释义按词性分组
  const meanings = (entry.meanings || []).map(m => ({
    pos: m.partOfSpeech || '',
    definitions: (m.definitions || []).slice(0, 5).map(d => d.definition),
    examples: (m.definitions || []).filter(d => d.example).slice(0, 3).map(d => d.example),
    synonyms: m.synonyms || [],
    antonyms: m.antonyms || [],
  }));

  // 变形数据（有些 API 版本没有，尝试提取）
  let wordForms = [];
  if (dictData[0].meanings) {
    // 部分版本在 sourceUrls 或 额外字段中有
  }

  return {
    word: entry.word || word,
    isChinese: false,
    phonetic: phoneticUk,
    phoneticAm: phoneticAm,
    audioUrl: audioUrl,
    meanings,
    chineseExplain: cnExplain,
    synonyms: synonyms.length > 0 ? synonyms : meanings.flatMap(m => m.synonyms).slice(0, 10),
    collocations: collocations,
    wordForms,
  };
}

/* ================================================================
   中→英：MyMemory 翻译 + Dictionary API 反查
   ================================================================ */
async function lookupZhToEn(word) {
  const enText = await fetchMyMemory(word, 'zh|en');
  if (!enText || enText === word) {
    throw new Error('翻译失败');
  }

  // 取翻译结果的首个英文词/短语，反查英文详情
  const firstWord = enText.split(/[\s,，、]/)[0].replace(/[^a-zA-Z-]/g, '');
  let enDetail = null;
  if (firstWord) {
    try {
      enDetail = await lookupEnToZh(firstWord);
    } catch (e) { /* 反查失败不影响主流程 */ }
  }

  return {
    word: enText,
    isChinese: true,
    sourceWord: word,
    phonetic: enDetail?.phonetic || '',
    phoneticAm: enDetail?.phoneticAm || '',
    audioUrl: enDetail?.audioUrl || '',
    meanings: enDetail?.meanings || [{ pos: '', definitions: [enText], examples: [] }],
    chineseExplain: word,
    synonyms: enDetail?.synonyms || [],
    collocations: enDetail?.collocations || [],
    wordForms: enDetail?.wordForms || [],
  };
}

/* ================================================================
   单个 API 调用
   ================================================================ */
async function fetchDictAPI(word) {
  const res = await fetchWithTimeout(API.DICT + encodeURIComponent(word));
  if (!res.ok) throw new Error('Dict API ' + res.status);
  return res.json();
}

async function fetchYoudao(word) {
  try {
    const res = await fetchWithTimeout(`${API.YOUDAO}?q=${encodeURIComponent(word)}&le=eng&num=3`, 4000);
    if (!res.ok) return '';
    const j = await res.json();
    const entries = j?.data?.entries;
    if (entries && entries.length > 0) {
      const matched = entries.find(e => e.entry?.toLowerCase() === word.toLowerCase());
      if (matched && matched.explain) return matched.explain;
      // 没有精确匹配，取第一个
      if (entries[0].explain) return entries[0].explain;
    }
    return '';
  } catch (e) {
    console.warn('有道查询失败:', e.message);
    return '';
  }
}

async function fetchDatamuseSynonyms(word) {
  try {
    const res = await fetchWithTimeout(`${API.DATAMUSE}/words?rel_syn=${encodeURIComponent(word)}&max=10`, 4000);
    if (!res.ok) return [];
    const data = await res.json();
    return data.map(d => d.word);
  } catch (e) {
    console.warn('Datamuse 同义词失败:', e.message);
    return [];
  }
}

async function fetchDatamuseCollocations(word) {
  try {
    const res = await fetchWithTimeout(`${API.DATAMUSE}/words?rel_jjb=${encodeURIComponent(word)}&max=6`, 4000);
    if (!res.ok) return [];
    const data = await res.json();
    return data.map(d => d.word);
  } catch (e) {
    console.warn('Datamuse 搭配失败:', e.message);
    return [];
  }
}

async function fetchMyMemoryCN(word) {
  return fetchMyMemory(word, 'en|zh');
}

async function fetchMyMemory(text, langpair) {
  try {
    const res = await fetchWithTimeout(`${API.MYMEMORY}?q=${encodeURIComponent(text)}&langpair=${langpair}`, 5000);
    if (!res.ok) return '';
    const j = await res.json();
    const t = j?.responseData?.translatedText;
    return (t && t !== text.toUpperCase()) ? t : '';
  } catch (e) {
    console.warn('MyMemory 失败:', e.message);
    return '';
  }
}

function analyzeWordRoots(word) {
  const w = word.toLowerCase();
  const parts = [];

  // 检查前缀（长前缀优先）
  const sortedPrefixes = Object.keys(WORD_ROOTS)
    .filter(k => WORD_ROOTS[k].startsWith('前') || WORD_ROOTS[k].startsWith('否') || WORD_ROOTS[k].startsWith('重') || WORD_ROOTS[k].startsWith('过') || WORD_ROOTS[k].startsWith('不'))
    .sort((a, b) => b.length - a.length);

  let remaining = w;
  for (const pref of sortedPrefixes) {
    if (remaining.startsWith(pref) && remaining.length > pref.length + 1) {
      parts.push(pref + ' → ' + WORD_ROOTS[pref]);
      remaining = remaining.slice(pref.length);
      break;
    }
  }

  // 检查后缀（长后缀优先）
  const sortedSuffixes = Object.keys(WORD_ROOTS)
    .filter(k => WORD_ROOTS[k].startsWith('形') || WORD_ROOTS[k].startsWith('名') || WORD_ROOTS[k].startsWith('动') || WORD_ROOTS[k].startsWith('副'))
    .sort((a, b) => b.length - a.length);

  let suffixPart = '';
  for (const suff of sortedSuffixes) {
    if (remaining.endsWith(suff) && remaining.length > suff.length) {
      suffixPart = suff + ' → ' + WORD_ROOTS[suff];
      remaining = remaining.slice(0, -suff.length);
      break;
    }
  }

  // 检查词根
  const sortedRoots = Object.keys(WORD_ROOTS)
    .filter(k => !WORD_ROOTS[k].startsWith('前') && !WORD_ROOTS[k].startsWith('否') &&
                 !WORD_ROOTS[k].startsWith('重') && !WORD_ROOTS[k].startsWith('过') &&
                 !WORD_ROOTS[k].startsWith('不') && !WORD_ROOTS[k].startsWith('形') &&
                 !WORD_ROOTS[k].startsWith('名') && !WORD_ROOTS[k].startsWith('动') &&
                 !WORD_ROOTS[k].startsWith('副'))
    .sort((a, b) => b.length - a.length);

  for (const root of sortedRoots) {
    if (remaining.includes(root) && root.length >= 3 && remaining !== root) {
      parts.push(root + ' → ' + WORD_ROOTS[root]);
      break;
    }
  }

  if (suffixPart) parts.push(suffixPart);

  if (parts.length === 0) {
    // 尝试纯后缀匹配（原词可能直接就是词根+后缀）
    for (const suff of sortedSuffixes) {
      if (w.endsWith(suff) && w.length > suff.length + 1) {
        parts.push(suff + ' → ' + WORD_ROOTS[suff]);
        break;
      }
    }
  }

  return parts.length > 0 ? '🔍 ' + w + ' = ' + parts.join(' + ') : null;
}

/* ================================================================
   生词本操作（详情页按钮）
   ================================================================ */
function addWordToBook() {
  const data = window._currentDetailData;
  if (!data) return;

  const meaning = data.chineseExplain || (data.meanings?.[0]?.definitions?.[0]) || '';

  const folders = getWordbookFolders();
  let folderOpts = folders.map(f => '<option value="' + f + '">' + f + '</option>').join('');
  // 新文件夹输入
  folderOpts += '<option value="__new__">➕ 新建文件夹…</option>';

  openModal(`
    <h3>📥 加入生词本</h3>
    <p style="color:var(--text-secondary);margin-bottom:4px;">单词：<strong>${escapeHTML(data.word)}</strong></p>
    <p style="color:var(--text-muted);font-size:0.82rem;margin-bottom:12px;">释义：${escapeHTML(meaning)}</p>
    <label style="display:block;font-size:0.82rem;color:var(--text-muted);margin-bottom:4px;">文件夹</label>
    <select class="input" id="wbFolder" style="margin-bottom:12px;font-size:0.9rem;">${folderOpts}</select>
    <input class="input" id="wbNewFolder" placeholder="新建文件夹名称…" style="display:none;margin-bottom:12px;font-size:0.9rem;">
    <label style="display:block;font-size:0.82rem;color:var(--text-muted);margin-bottom:4px;">标签（逗号分隔）</label>
    <input class="input" id="wbTags" placeholder="如：形容词, 高频词汇" style="font-size:0.9rem;">
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="confirmAddToBook()">确认添加</button>
    </div>
  `);

  // 文件夹切换逻辑
  setTimeout(() => {
    const sel = document.getElementById('wbFolder');
    const newF = document.getElementById('wbNewFolder');
    if (sel && newF) {
      sel.addEventListener('change', () => {
        if (sel.value === '__new__') { newF.style.display = 'block'; }
        else { newF.style.display = 'none'; }
      });
    }
  }, 100);
}

function confirmAddToBook() {
  const data = window._currentDetailData;
  if (!data) return;

  const folderSel = document.getElementById('wbFolder');
  const newFolder = document.getElementById('wbNewFolder');
  const tagsInput = document.getElementById('wbTags');

  let folder = folderSel?.value || '默认';
  if (folder === '__new__' && newFolder?.value.trim()) {
    folder = newFolder.value.trim();
  }

  const tags = tagsInput?.value
    ? tagsInput.value.split(/[,，]/).map(t => t.trim()).filter(Boolean)
    : [];

  const meaning = data.chineseExplain || (data.meanings?.[0]?.definitions?.[0]) || '';

  const success = addToWordbook({
    word: data.word,
    phonetic: data.phonetic || '',
    phoneticAm: data.phoneticAm || '',
    meaning: meaning,
    pos: data.meanings?.[0]?.pos || '',
    audioUrl: data.audioUrl || '',
    folder,
    tags,
  });

  closeModal();
  if (success) {
    showToast('✅ 已加入生词本');
    // 刷新详情页按钮状态
    showWordDetail(data, data.word);
  } else {
    showToast('⚠️ 该单词已在生词本中');
  }
}

function markAsMastered() {
  const data = window._currentDetailData;
  if (!data) return;

  const meaning = data.chineseExplain || (data.meanings?.[0]?.definitions?.[0]) || '';

  // 如果不在生词本，先添加
  if (!isWordInBook(data.word)) {
    addToWordbook({
      word: data.word,
      phonetic: data.phonetic || '',
      phoneticAm: data.phoneticAm || '',
      meaning: meaning,
      pos: data.meanings?.[0]?.pos || '',
      audioUrl: data.audioUrl || '',
      folder: '默认',
      tags: [],
    });
  }

  // 更新 mastery 为已掌握
  const wb = getWordbook();
  const entry = wb.find(w => w.word.toLowerCase() === data.word.toLowerCase());
  if (entry) {
    updateWordInBook(entry.id, { mastery: 2, reviewCount: (entry.reviewCount || 0) + 1 });
  }

  showToast('✅ 已标记为掌握');
  incrementStat('mastered');
}

/* ================================================================
   HTML 转义
   ================================================================ */
function escapeHTML(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ================================================================
   生词本渲染
   ================================================================ */
let wordbookFilter = { folder: '全部', search: '', sort: 'time' };

function renderWordbook() {
  const wb = getWordbook();
  const list = document.getElementById('wordbookList');
  const folderRow = document.getElementById('folderFilters');

  // 文件夹筛选
  const folders = getWordbookFolders();
  folderRow.innerHTML = '<span class="tag' + (wordbookFilter.folder === '全部' ? ' active' : '') + '" style="cursor:pointer;" onclick="setWordbookFolder(\'全部\')">全部 (' + wb.length + ')</span>';
  for (const f of folders) {
    const count = wb.filter(w => w.folder === f).length;
    folderRow.innerHTML += '<span class="tag' + (wordbookFilter.folder === f ? ' active' : '') + '" style="cursor:pointer;" onclick="setWordbookFolder(\'' + f.replace(/'/g, "\\'") + '\')">' + f + ' (' + count + ')</span>';
  }

  // 搜索事件
  const searchEl = document.getElementById('wordbookSearch');
  searchEl.oninput = function() {
    wordbookFilter.search = this.value;
    renderWordbook();
  };

  // 排序事件
  const sortEl = document.getElementById('wordbookSort');
  sortEl.onchange = function() {
    wordbookFilter.sort = this.value;
    renderWordbook();
  };

  // 筛选
  let filtered = wb;
  if (wordbookFilter.folder !== '全部') {
    filtered = filtered.filter(w => w.folder === wordbookFilter.folder);
  }
  if (wordbookFilter.search) {
    const q = wordbookFilter.search.toLowerCase();
    filtered = filtered.filter(w =>
      w.word.toLowerCase().includes(q) ||
      w.meaning.toLowerCase().includes(q) ||
      (w.tags && w.tags.some(t => t.toLowerCase().includes(q)))
    );
  }

  // 排序
  if (wordbookFilter.sort === 'alpha') {
    filtered.sort((a, b) => a.word.localeCompare(b.word));
  } else if (wordbookFilter.sort === 'mastery') {
    filtered.sort((a, b) => b.mastery - a.mastery);
  } else {
    // time — 默认按添加时间倒序
    filtered.sort((a, b) => b.addedAt - a.addedAt);
  }

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📚</div><h3>' +
      (wb.length === 0 ? '还没有收藏单词' : '没有匹配的单词') + '</h3><p>' +
      (wb.length === 0 ? '查单词时点击「加入生词本」即可收藏' : '试试调整筛选条件') + '</p></div>';
    return;
  }

  list.innerHTML = filtered.map(w => {

/* ================================================================
   SM-2 间隔复习算法
   ================================================================ */
function sm2Calc(card, rating) {
  // rating: 0=生疏, 1=犹豫, 2=熟悉
  let { easeFactor, interval, reviewCount } = card;

  if (rating === 0) {
    // 生疏：重置间隔
    interval = 1;
    easeFactor = Math.max(1.3, easeFactor - 0.2);
  } else if (rating === 1) {
    // 犹豫
    interval = Math.max(1, Math.round(interval * 1.3));
    // ease 不变
  } else if (rating === 2) {
    // 熟悉
    if (reviewCount === 0) {
      interval = 1;
    } else if (reviewCount === 1) {
      interval = 3;
    } else {
      interval = Math.round(interval * easeFactor);
    }
    easeFactor = Math.min(3.0, easeFactor + 0.1);
  }

  reviewCount++;
  const nextReview = Date.now() + interval * 86400000;

  return {
    mastery: rating,
    interval,
    easeFactor,
    reviewCount,
    nextReview,
    lastReview: Date.now(),
  };
}

/* ================================================================
   模式 2：选择题
   ================================================================ */
function renderQuiz(area) {
  if (studyIndex >= studyQueue.length) {
    area.innerHTML = '<div class="card" style="text-align:center;padding:40px;">' +
      '<div style="font-size:3rem;">🏆</div>' +
      '<h3>测验完成！</h3><p style="color:var(--text-muted);">得分：' + studyScore + ' / ' + studyQueue.length + '</p>' +
      '<button class="btn btn-primary btn-sm" style="margin-top:16px;" onclick="endStudy()">返回</button></div>';
    return;
  }

  const card = studyQueue[studyIndex];
  const wb = getWordbook();

  // 生成选项：1 正确 + 3 干扰项
  let distractors = wb
    .filter(w => w.word.toLowerCase() !== card.word.toLowerCase())
    .sort(() => Math.random() - 0.5)
    .slice(0, 3)
    .map(w => w.meaning);

  // 如果不够 3 个，用内置假选项
  while (distractors.length < 3) {
    const fake = ['一种抽象概念', '日常用语表达', '专业技术术语', '文学作品中的词汇', '某种动作或状态', '常见物品名称'];
    const f = fake[distractors.length];
    if (!distractors.includes(f)) distractors.push(f);
  }

  const options = [card.meaning, ...distractors].sort(() => Math.random() - 0.5);
  const correctIndex = options.indexOf(card.meaning);

  window._quizCorrectIndex = correctIndex;

  let optsHTML = '';
  const labels = ['A', 'B', 'C', 'D'];
  for (let i = 0; i < options.length; i++) {
    optsHTML +=
      '<button class="card" style="text-align:left;cursor:pointer;padding:14px 18px;display:flex;align-items:center;gap:12px;" ' +
      'onclick="answerQuiz(' + i + ')" id="quizOpt' + i + '">' +
      '<span style="width:32px;height:32px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0;">' + labels[i] + '</span>' +
      '<span style="font-size:0.95rem;">' + escapeHTML(options[i]) + '</span></button>';
  }

  area.innerHTML =
    '<div class="card" style="margin-bottom:16px;text-align:center;">' +
    '<p style="color:var(--text-muted);font-size:0.78rem;margin-bottom:4px;">' + (studyIndex + 1) + ' / ' + studyQueue.length + '</p>' +
    '<p style="font-size:2rem;font-weight:800;">' + escapeHTML(card.word) + '</p>' +
    (card.phonetic ? '<p style="color:var(--text-muted);font-size:0.85rem;">' + escapeHTML(card.phonetic) + '</p>' : '') +
    '</div>' +
    '<p style="color:var(--text-muted);font-size:0.85rem;margin-bottom:10px;">选择正确的中文释义：</p>' +
    '<div style="display:flex;flex-direction:column;gap:10px;">' + optsHTML + '</div>';
}

function answerQuiz(choice) {
  const correct = window._quizCorrectIndex;
  const isCorrect = choice === correct;

  // 高亮正确和错误
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById('quizOpt' + i);
    if (!btn) continue;
    btn.style.pointerEvents = 'none';
    if (i === correct) btn.style.borderColor = 'var(--success)';
    if (i === choice && !isCorrect) btn.style.borderColor = 'var(--danger)';
  }

  if (isCorrect) {
    studyScore++;
    incrementStat('reviewed');
  }

  const rating = isCorrect ? 2 : 0;
  const card = studyQueue[studyIndex];
  const wb = getWordbook();
  const entry = wb.find(w => w.word.toLowerCase() === card.word.toLowerCase());
  if (entry) {
    const updates = sm2Calc(entry, rating);
    updateWordInBook(entry.id, updates);
  }

  // 答错放回队尾（最多回炉 2 次）
  if (!isCorrect) {
    const retries = retryMap[card.word] || 0;
    if (retries < 2) {
      retryMap[card.word] = retries + 1;
      studyQueue.push(card);
    }
  }

  setTimeout(() => {
    studyIndex++;
    if (studyIndex >= studyQueue.length) {
      studyIndex = studyQueue.length;
    }
    renderQuiz(document.getElementById('studyArea'));
  }, 1200);
}

function checkDictation() {
  const card = studyQueue[studyIndex];
  const input = document.getElementById('dictInput');
  const fb = document.getElementById('dictFeedback');
  if (!input) return;

  const answer = input.value.trim();
  const isCorrect = answer.toLowerCase() === card.word.toLowerCase();

  if (isCorrect) {
    fb.innerHTML = '<span style="color:var(--success);">✅ 正确！</span>';
    studyScore++;
    incrementStat('reviewed');
  } else {
    fb.innerHTML = '<span style="color:var(--danger);">❌ 错误！正确拼写：<strong>' + escapeHTML(card.word) + '</strong></span>';
    // 答错放回队尾（最多回炉 2 次）
    const retries = retryMap[card.word] || 0;
    if (retries < 2) {
      retryMap[card.word] = retries + 1;
      studyQueue.push(card);
    }
  }

  const rating = isCorrect ? 2 : 0;
  const wb = getWordbook();
  const entry = wb.find(w => w.word.toLowerCase() === card.word.toLowerCase());
  if (entry) {
    const updates = sm2Calc(entry, rating);
    updateWordInBook(entry.id, updates);
  }

  setTimeout(() => {
    studyIndex++;
    renderDictation(document.getElementById('studyArea'));
  }, 1600);
}

/* ================================================================
   数据统计（Task 10 完善：热力图 + 曲线图）
   ================================================================ */
function renderStats() {
  const wb = getWordbook();
  const stats = getStats();
  const today = newDateString();

  // 统计指标
  let totalQueries = 0, totalReviewed = 0, totalMastered = 0;
  Object.values(stats).forEach(s => {
    totalQueries += (s.queries || 0);
    totalReviewed += (s.reviewed || 0);
    totalMastered += (s.mastered || 0);
  });
  const mastered = wb.filter(w => w.mastery === 2).length;

  // 连续天数
  let streak = 0;
  const d = new Date();
  for (let i = 0; i < 365; i++) {
    const ds = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    if (stats[ds] && stats[ds].reviewed > 0) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }

  document.getElementById('statQueries').textContent = totalQueries;
  document.getElementById('statWords').textContent = wb.length;
  document.getElementById('statMastered').textContent = mastered;
  document.getElementById('statStreak').textContent = streak;

  // ─── 7 天热力图 ───
  renderHeatmap(stats);

  // ─── 词汇量增长曲线 ───
  renderVocabCurve(stats);
}

function renderHeatmap(stats) {
  const container = document.getElementById('heatmapContainer');
  if (!container) return;

  const days = [];
  const d = new Date();
  for (let i = 6; i >= 0; i--) {
    const date = new Date(d);
    date.setDate(date.getDate() - i);
    const ds = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
    const dayStats = stats[ds] || { queries: 0, reviewed: 0, mastered: 0 };
    const total = dayStats.queries + dayStats.reviewed + dayStats.mastered;
    const labels = ['日', '一', '二', '三', '四', '五', '六'];
    days.push({
      date: ds,
      dayLabel: labels[date.getDay()],
      dateLabel: ds.slice(5),
      total,
      reviewed: dayStats.reviewed || 0,
      mastered: dayStats.mastered || 0,
    });
  }

  const maxVal = Math.max(1, ...days.map(d => d.total));
  const isToday = (ds) => ds === days[days.length - 1].date;

  container.innerHTML =
    '<h4 style="margin-bottom:14px;color:var(--accent-warm);">📅 最近 7 天学习热力图</h4>' +
    '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">' +
    days.map(d => {
      const intensity = d.total / maxVal;
      let bg;
      if (d.total === 0) bg = 'rgba(255,255,255,0.03)';
      else if (intensity < 0.25) bg = 'rgba(123,147,255,0.15)';
      else if (intensity < 0.5) bg = 'rgba(123,147,255,0.3)';
      else if (intensity < 0.75) bg = 'rgba(123,147,255,0.5)';
      else bg = 'rgba(123,147,255,0.7)';

      const border = isToday(d.date) ? '2px solid var(--accent)' : '1px solid var(--border)';

      return '<div style="flex:1;min-width:40px;max-width:60px;text-align:center;">' +
        '<div style="aspect-ratio:1;background:' + bg + ';border:' + border + ';border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;' + (d.total > 0 ? 'color:var(--text);' : 'color:var(--text-muted);') + '">' +
        (d.total > 0 ? d.total : '·') + '</div>' +
        '<div style="font-size:0.65rem;color:var(--text-muted);margin-top:4px;">' + d.dayLabel + '</div>' +
        '<div style="font-size:0.6rem;color:var(--text-muted);">' + d.dateLabel + '</div>' +
        '</div>';
    }).join('') +
    '</div>';
}

function renderVocabCurve(stats) {
  const container = document.getElementById('curveContainer');
  if (!container) return;

  // 收集最近 30 天的累计掌握数据
  const days = [];
  const d = new Date();
  for (let i = 29; i >= 0; i--) {
    const date = new Date(d);
    date.setDate(date.getDate() - i);
    const ds = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
    const dayStats = stats[ds];
    days.push({
      date: (date.getMonth() + 1) + '/' + date.getDate(), // M/D 格式
      mastered: dayStats ? (dayStats.mastered || 0) : 0,
      reviewed: dayStats ? (dayStats.reviewed || 0) : 0,
    });
  }

  // 累计值
  let cum = 0;
  const points = days.map(d => { cum += d.mastered; return cum; });
  const maxVal = Math.max(1, ...points);

  container.innerHTML =
    '<h4 style="margin-bottom:14px;color:var(--accent-warm);">📈 词汇量增长曲线（近 30 天）</h4>' +
    '<canvas id="vocabCanvas" style="width:100%;max-width:100%;height:200px;display:block;"></canvas>' +
    '<p style="text-align:center;color:var(--text-muted);font-size:0.72rem;margin-top:4px;">累计掌握单词数</p>';

  // 用 requestAnimationFrame 确保 DOM 就绪后绘制
  requestAnimationFrame(() => {
    const canvas = document.getElementById('vocabCanvas');
    if (!canvas) return;

    // 高清适配
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = 200 * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const W = rect.width;
    const H = 200;
    ctx.clearRect(0, 0, W, H);

    const pad = { top: 20, right: 16, bottom: 32, left: 38 };
    const pw = W - pad.left - pad.right;
    const ph = H - pad.top - pad.bottom;

    // 网格线
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= 4; i++) {
      const y = pad.top + (ph / 4) * i;
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(W - pad.right, y);
      ctx.stroke();
    }

    // Y 轴标签
    ctx.fillStyle = '#5c5c72';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'right';
    for (let i = 0; i <= 4; i++) {
      const val = Math.round((maxVal / 4) * (4 - i));
      const y = pad.top + (ph / 4) * i;
      ctx.fillText(String(val), pad.left - 8, y + 4);
    }

    // 空数据
    if (points.every(p => p === 0)) {
      ctx.fillStyle = '#5c5c72';
      ctx.font = '13px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('暂无数据，去学习页复习单词吧！', W / 2, H / 2);
      return;
    }

    const stepX = pw / (points.length - 1);

    // 渐变填充
    const grad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
    grad.addColorStop(0, 'rgba(123,147,255,0.22)');
    grad.addColorStop(1, 'rgba(123,147,255,0.01)');

    ctx.beginPath();
    ctx.moveTo(pad.left, H - pad.bottom);
    for (let i = 0; i < points.length; i++) {
      const x = pad.left + stepX * i;
      const y = pad.top + ph * (1 - points[i] / maxVal);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(pad.left + stepX * (points.length - 1), H - pad.bottom);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // 折线
    ctx.beginPath();
    ctx.strokeStyle = '#7b93ff';
    ctx.lineWidth = 1.8;
    ctx.lineJoin = 'round';
    for (let i = 0; i < points.length; i++) {
      const x = pad.left + stepX * i;
      const y = pad.top + ph * (1 - points[i] / maxVal);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // 数据点（只画最近一天和峰值）
    for (let i = 0; i < points.length; i++) {
      if (points[i] === maxVal || i === points.length - 1) {
        const x = pad.left + stepX * i;
        const y = pad.top + ph * (1 - points[i] / maxVal);
        ctx.beginPath();
        ctx.fillStyle = '#b095f9';
        ctx.arc(x, y, 3.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // X 轴标签（每 7 天显示一个日期）
    ctx.fillStyle = '#6b6b82';
    ctx.font = '9px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    for (let i = 0; i < days.length; i += 7) {
      const x = pad.left + stepX * i;
      ctx.fillText(days[i].date, x, H - 8);
    }
  });
}

  const reader = new FileReader();
  reader.onload = function() {
    try {
      importAllData(reader.result);

async function generateDailyWord() {
  const settings = getSettings();
  const source = settings.dailyWordSource;
  let wordData = null;

  try {
    if (source === 'api') {
      wordData = await generateDailyFromAPI();
    } else if (source === 'wordbook') {
      wordData = generateDailyFromWordbook();
    } else {
      wordData = generateDailyFromBank(settings.targetBank);
    }
  } catch (e) {
    console.warn('每日一词生成失败:', e);
    // 兜底：用内置词库
    wordData = generateDailyFromBank('cet4');
  }

  if (wordData) {
    setDailyWord(wordData);
    renderDailyWord();
  }
}

async function generateDailyFromAPI() {
  // 从 Datamuse 随机取词 + Dictionary API 取释义
  const letters = 'abcdefghijklmnopqrstuvwxyz';
  const randomPrefix = letters[Math.floor(Math.random() * letters.length)];
  try {
    const res = await fetchWithTimeout(`${API.DATAMUSE}/words?sp=${randomPrefix}*&max=20`, 4000);
    if (!res.ok) throw new Error('API error');
    const words = await res.json();
    if (words.length === 0) throw new Error('No words');

    // 选一个长度合适的词
    const filtered = words.filter(w => w.word.length >= 4 && w.word.length <= 10 && /^[a-z]+$/i.test(w.word));
    const pick = filtered.length > 0
      ? filtered[Math.floor(Math.random() * filtered.length)]
      : words[Math.floor(Math.random() * words.length)];

    // 查释义
    let meaning = '', phonetic = '';
    try {
      const dictRes = await fetchDictAPI(pick.word);
      if (dictRes && dictRes[0]) {
        const m = dictRes[0].meanings?.[0];
        if (m) meaning = (m.definitions?.[0]?.definition) || '';
        if (dictRes[0].phonetics?.[0]?.text) phonetic = dictRes[0].phonetics[0].text;
      }
    } catch (e) { /* ignore */ }

    // 查中文
    const cn = await fetchYoudao(pick.word);

    return {
      word: pick.word,
      phonetic,
      meaning: cn || meaning || '来自 API 推荐',
    };
  } catch (e) {
    throw e;
  }
}

function generateDailyFromWordbook() {
  const wb = getWordbook();
  if (wb.length === 0) {
    // 生词本为空，回退到内置词库
    return generateDailyFromBank('cet4');
  }
  const pick = wb[Math.floor(Math.random() * wb.length)];
  return {
    word: pick.word,
    phonetic: pick.phonetic,
    meaning: pick.meaning,
  };
}

function generateDailyFromBank(bank) {
  const wordList = WORD_BANKS[bank] || WORD_BANKS['cet4'];
  // 用日期做种子，保证同一天同一词库取到同一个词
  const today = newDateString();
  let seed = 0;
  for (let i = 0; i < today.length; i++) seed = ((seed << 5) - seed) + today.charCodeAt(i);
  seed = Math.abs(seed);
  const idx = seed % wordList.length;
  const [word, meaning] = wordList[idx];

  // 取音标（尝试从缓存或简单规则）
  let phonetic = '';
  // 尝试从缓存取
  const cached = STATE.searchCache.get(word.toLowerCase());
  if (cached && cached.data.phonetic) {
    phonetic = cached.data.phonetic;
  }

  return { word, meaning, phonetic };
}

/* ================================================================
   学习徽章更新
   ================================================================ */
function updateStudyBadge() {
  const wb = getWordbook();
  const today = newDateString();
  const due = wb.filter(w => w.nextReview <= Date.now()).length;
  const badge = document.getElementById('studyBadge');
  if (due > 0) {
    badge.style.display = 'flex';
    badge.textContent = due;
  } else {
    badge.style.display = 'none';
  }
}
