name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Debug env
        run: |
          echo "=== Java ==="
          java -version 2>&1
          echo "=== ANDROID_HOME ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "ANDROID_HOME not found at default"
          # Try common locations
          for d in /usr/local/lib/android/sdk /opt/android $HOME/android-sdk; do
            if [ -d "$d" ]; then
              echo "Found SDK at: $d"
              ls "$d/platforms/" 2>/dev/null || echo "  No platforms dir"
              ls "$d/build-tools/" 2>/dev/null || echo "  No build-tools dir"
            fi
          done
          echo "=== Gradle wrapper ==="
          ls -la android/gradlew android/gradle/wrapper/gradle-wrapper.jar 2>/dev/null

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon 2>&1
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wordmaster-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
